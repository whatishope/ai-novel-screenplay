app:
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:5173}

llm:
  api-key: ${LLM_API_KEY:your-api-key}
  base-url: ${LLM_BASE_URL:https://api.deepseek.com/v1}
  model: ${LLM_MODEL:deepseek-chat}
  timeout-seconds: ${LLM_TIMEOUT_SECONDS:60}
  json-response-enabled: ${LLM_JSON_RESPONSE_ENABLED:true}
